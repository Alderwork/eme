# Example tmux configuration for eme

# Open the eme dashboard in a centered popup with <prefix> a
bind-key a display-popup -E -w 80% -h 80% eme

# Surface agents waiting for your input in the status bar, and jump to one.
# Requires `eme hooks install` so agents report their real state.
set -g status-interval 2
set -ga status-right '#(eme status --tmux)'   # ●N when N agents wait for input
bind-key w run-shell 'eme jump'               # prefix + w → jump to a waiting agent
